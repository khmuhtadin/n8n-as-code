name: Publish VS Code Extension (Manual)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish from (branch, tag, or SHA)
        required: true
        default: main
        type: string
      version:
        description: Extension version to publish (e.g. 0.14.9)
        required: true
        type: string
      pre_release:
        description: Publish as pre-release
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  publish-vscode:
    name: Publish VS Code Extension
    runs-on: ubuntu-latest
    environment: ${{ inputs.pre_release && 'next' || 'prod' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: npm install

      - name: Validate version format
        run: |
          VERSION='${{ inputs.version }}'
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ VS Code Marketplace requires plain major.minor.patch versions, got '$VERSION'"
            exit 1
          fi
          if [[ '${{ inputs.pre_release }}' == 'true' ]]; then
            echo "ℹ️ Pre-release publish selected. Prefer the VS Marketplace convention even minor = stable, odd minor = pre-release."
          fi

      - name: Build/package/publish extension
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
        run: |
          if [[ -z "$VSCE_TOKEN" ]]; then
            echo "❌ VSCE_TOKEN is missing in the selected environment secrets."
            exit 1
          fi

          cd packages/vscode-extension

          # Remove "private" flag without committing (prevents vsce from rejecting the package)
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            delete pkg.private;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          node ../../scripts/set-version-if-needed.mjs --target '${{ inputs.version }}' --package-json package.json
          npm run build
          npx @vscode/vsce package --no-dependencies

          if [[ '${{ inputs.pre_release }}' == 'true' ]]; then
            npx @vscode/vsce publish --no-dependencies --pre-release --pat "$VSCE_TOKEN"
          else
            npx @vscode/vsce publish --no-dependencies --pat "$VSCE_TOKEN"
          fi

          # Publish only stable builds to Open VSX. Preview metadata exists there,
          # but downstream clients can still resolve the highest version by default.
          if [[ '${{ inputs.pre_release }}' == 'true' ]]; then
            echo "ℹ️ Skipping Open VSX publish for pre-release builds."
          elif [[ -z "$OVSX_TOKEN" ]]; then
            echo "⚠️ OVSX_TOKEN is missing, skipping Open VSX publish."
          else
            npx ovsx publish *.vsix -p "$OVSX_TOKEN"
          fi
